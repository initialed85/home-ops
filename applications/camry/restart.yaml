---
kind: ServiceAccount
apiVersion: v1
metadata:
    name: restart
    namespace: camry
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
    name: restart
    namespace: camry
rules:
    - apiGroups: [""]
      resources: ["pods", "statefulsets", "daemonsets"]
      verbs: ["get", "patch", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
    name: restart
    namespace: camry
roleRef:
    apiGroup: rbac.authorization.k8s.io
    kind: Role
    name: restart
subjects:
    - kind: ServiceAccount
      name: restart
---
apiVersion: batch/v1beta1
kind: CronJob
metadata:
    name: deleting-pod
    namespace: camry
spec:
    concurrencyPolicy: Forbid
    schedule: "0 1 * * *"
    jobTemplate:
        spec:
            backoffLimit: 0
            activeDeadlineSeconds: 600
            template:
                spec:
                    serviceAccountName: restart
                    restartPolicy: Never
                    containers:
                        - name: kubectl
                          image: bitnami/kubectl
                          command:
                              - "kubectl"
                              - "-n"
                              - "camry"
                              - "rollout"
                              - restart"
                              - "statefulset,deployment"
